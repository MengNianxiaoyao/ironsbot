name: Build Alias DB

on:
    push:
        branches: [main]
        paths:
            - "tables/*.csv"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Build alias database
              run: python scripts/build_alias_db.py

            - name: Generate SHA256 checksum
              run: sha256sum aliases-data.sqlite > aliases-data.sqlite.sha256

            - name: Upload to Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: alias-db-latest
                  name: 别名数据库
                  make_latest: false
                  body: |
                      自动构建的别名数据库，由 `tables/*.csv` 变更触发。

                      最后更新提交: ${{ github.sha }}
                  files: |
                      aliases-data.sqlite
                      aliases-data.sqlite.sha256
