# 安装: uv sync --extra dev && pre-commit install
# 手动运行全部钩子: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: check-version-sync
        name: __version__ 与 pyproject 版本一致
        entry: python scripts/check_version_sync.py
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|__version__)$
        stages: [pre-commit]
